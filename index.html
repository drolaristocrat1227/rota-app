<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="当番表">
<meta name="theme-color" content="#7a9e7e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>当番表</title>
<style>
:root{
  --bg:#f4f2ed;--surface:#ffffff;--surface-alt:#f0ede6;
  --text:#3a3730;--text-soft:#6a6558;--text-faint:#a09888;
  --border:#e0dbd0;--border-soft:#d5cfc5;
  --primary:#7a9e7e;--primary-dark:#5a7e5e;--primary-tint:#eaf2ea;
  --danger:#c4825a;--danger-tint:#f8ede6;
  --sun:#c05040;--sat:#6888b0;--today:#c4825a;
  --shadow:0 2px 10px rgba(58,55,48,.09);--shadow-lg:0 10px 28px rgba(58,55,48,.18);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif;background:var(--bg);color:var(--text);font-size:14px;scrollbar-width:none}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none}
input,button,textarea{font-family:inherit;font-size:inherit}
input{-webkit-user-select:text;user-select:text}
button{cursor:pointer;border:none;background:none;outline:none}

#app{display:flex;flex-direction:column;height:100dvh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);overflow:hidden;width:100%}

.hdr{flex:0 0 48px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);border-bottom:1px solid var(--border);padding:0 10px}
.hdr h1{font-size:17px;font-weight:700;letter-spacing:1px;position:absolute;left:50%;transform:translateX(-50%)}
.btn-reset-hdr{font-size:12px;color:var(--danger);background:var(--danger-tint);border-radius:8px;padding:6px 11px;font-weight:700;border:1px solid rgba(214,83,109,.25);position:relative;z-index:1}
.btn-reset-hdr:active{filter:brightness(.9)}
.btn-exec-hdr{font-size:12px;color:#fff;background:var(--primary);border-radius:8px;padding:6px 11px;font-weight:700;position:relative;z-index:1}
.btn-exec-hdr:active{filter:brightness(.9)}

.mnav{flex:0 0 46px;display:flex;align-items:center;gap:6px;padding:0 10px;background:var(--surface);border-bottom:1px solid var(--border)}
.btn-arr{width:36px;height:34px;border-radius:9px;background:var(--surface-alt);border:1px solid var(--border);font-size:13px;color:var(--text-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:700}
.btn-arr:active{background:var(--primary-tint);border-color:var(--primary)}
.btn-ym{flex:1;font-size:19px;font-weight:700;letter-spacing:1px;color:var(--text);padding:6px;border-radius:9px;text-align:center}
.btn-ym:active{background:var(--primary-tint);color:var(--primary-dark)}

/* Calendar */
.cal-sec{flex:1;min-height:0;overflow:hidden;background:var(--surface);display:flex;flex-direction:column}

.cal-grid{flex:1;display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:24px repeat(var(--cal-rows,6),1fr);border-top:1px solid var(--border);overflow:hidden}
.dh{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--surface-alt);border-right:1px solid var(--border);border-bottom:1px solid var(--border);color:var(--text-soft)}
.dh:first-child{border-left:1px solid var(--border)}
.dc{border-right:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:background .1s;cursor:pointer}
.dc:nth-child(7n+1){border-left:1px solid var(--border)}
.dc.empty{background:var(--bg);cursor:default}
.dc.selected{background:var(--primary-tint);box-shadow:inset 0 0 0 2px var(--primary)}
.dn{font-size:11px;font-weight:700;padding:2px 3px 1px;flex-shrink:0;display:flex;justify-content:flex-end}
.dn-inner{min-width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:11px}
.dc.is-today .dn-inner{background:var(--today);color:#fff}
.dnames{display:flex;flex-direction:column;gap:2px;padding:0 2px 2px;overflow:hidden}
.chip{font-size:10px;font-weight:600;padding:2px 4px;border-radius:5px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;flex-shrink:0;transition:opacity .15s}
.chip.pressing{opacity:.6}

/* Name card section — 3 rows tall */
.names-sec{flex:0 0 168px;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:7px 10px 6px;scrollbar-width:none;background:var(--surface);border-top:2px solid var(--border)}
.names-sec::-webkit-scrollbar{display:none}
.names-hint{font-size:11px;color:var(--text-faint);font-weight:600;margin-bottom:7px;line-height:1.4}
.names-hint.active{color:var(--primary-dark);font-weight:700}
.name-cards{display:flex;flex-wrap:wrap;gap:7px;align-content:flex-start}

/* Name card */
.nc{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;background:var(--surface-alt);border:1.5px solid var(--border-soft);border-radius:20px;box-shadow:var(--shadow);touch-action:none;transition:border-color .15s,background .15s,opacity .15s}
.nc.dragging{opacity:.25;box-shadow:none}
.nc.press-hi{box-shadow:0 0 0 2.5px var(--primary),var(--shadow)}
.nc .nm{font-size:13px;font-weight:600;color:var(--text)}
.nc .cnt{font-size:15px;font-weight:700;color:var(--primary);line-height:1;min-width:16px;text-align:center}

/* Drop line shown between cards during reorder */
.nc-drop-line{width:3px;min-width:3px;height:36px;background:var(--primary);border-radius:2px;flex-shrink:0;align-self:center;pointer-events:none}

.btn-add-name{display:inline-flex;align-items:center;padding:7px 14px;border:1.5px dashed var(--border-soft);border-radius:20px;font-size:13px;color:var(--text-soft);background:var(--surface-alt);font-weight:700;gap:4px}
.btn-add-name:active{background:var(--primary-tint);border-color:var(--primary);color:var(--primary-dark)}

/* 区切りカード */
.nc.nc-sep{background:var(--surface);border-style:dashed;border-color:var(--border-soft)}
.sep-bar{flex:1;height:1.5px;background:var(--border-soft);border-radius:1px}
.sep-lbl{font-size:11px;color:var(--text-faint);font-weight:700;white-space:nowrap}
/* カレンダーセル内の区切りライン */
.sep-chip{height:10px;display:flex;align-items:center;margin:1px 0;cursor:pointer;flex-shrink:0}
.sep-chip::after{content:'';flex:1;height:2px;background:var(--border-soft);border-radius:1px}
.sep-chip.pressing::after{opacity:.4}

/* Action Sheet */
.sheet-ov{position:fixed;inset:0;background:rgba(58,55,48,.38);z-index:10000;display:none;align-items:flex-end;justify-content:center}
.sheet-ov.on{display:flex}
.sheet{background:var(--bg);border-radius:16px 16px 0 0;width:100%;max-width:420px;overflow:hidden;box-shadow:var(--shadow-lg);padding-bottom:calc(6px + env(safe-area-inset-bottom))}
.sheet-title{padding:13px 16px 11px;font-size:13px;font-weight:700;color:var(--text-faint);text-align:center;background:var(--surface);border-bottom:1px solid var(--border)}
.sheet-act{display:block;width:100%;padding:16px;font-size:16px;font-weight:600;color:var(--text);text-align:center;background:var(--surface);border:none;border-bottom:1px solid var(--border);cursor:pointer}
.sheet-act.danger{color:var(--danger)}
.sheet-act:active{background:var(--surface-alt)}
.sheet-gap{height:8px}
.sheet-cancel{display:block;width:calc(100% - 16px);margin:0 8px;padding:14px;font-size:16px;font-weight:700;color:var(--primary-dark);text-align:center;background:var(--surface);border-radius:12px;border:none;cursor:pointer}
.sheet-cancel:active{background:var(--primary-tint)}

/* YM overlay */
.ym-ov{position:fixed;inset:0;background:rgba(58,55,48,.32);z-index:10001;display:none;align-items:flex-end;justify-content:center}
.ym-ov.on{display:flex}
.ym-sheet{background:var(--surface);border-radius:18px 18px 0 0;width:100%;max-width:400px;padding:18px 16px;padding-bottom:calc(18px + env(safe-area-inset-bottom));box-shadow:var(--shadow-lg)}
.ym-yr-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px}
.ym-yr-btn{width:38px;height:38px;border-radius:10px;background:var(--surface-alt);border:1px solid var(--border);font-size:16px;color:var(--text-soft);display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer}
.ym-yr-btn:active{background:var(--primary-tint)}
.ym-yr{font-size:22px;font-weight:700;min-width:88px;text-align:center}
.ym-months{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.ym-mb{padding:11px 2px;border-radius:11px;font-size:14px;font-weight:600;text-align:center;background:var(--surface-alt);border:1.5px solid var(--border);color:var(--text);cursor:pointer}
.ym-mb:active{background:var(--primary-tint);border-color:var(--primary)}
.ym-mb.sel{background:var(--primary);color:#fff;border-color:var(--primary)}
.ym-cancel{width:100%;padding:12px;text-align:center;font-size:14px;font-weight:700;color:var(--danger);border-radius:11px;cursor:pointer}
.ym-cancel:active{background:var(--danger-tint)}

/* Dialog */
.dlg-ov{position:fixed;inset:0;background:rgba(58,55,48,.32);z-index:10002;display:none;align-items:center;justify-content:center;padding:20px}
.dlg-ov.on{display:flex}
.dlg-box{background:var(--surface);border-radius:16px;padding:22px 18px;max-width:290px;width:100%;text-align:center;box-shadow:var(--shadow-lg)}
.dlg-msg{font-size:14px;line-height:1.65;margin-bottom:14px;color:var(--text);white-space:pre-line;font-weight:600}
.dlg-extra{margin-bottom:12px}
.dlg-acts{display:flex;gap:10px}
.dlg-acts button{flex:1;padding:11px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.dlg-cancel{background:var(--surface-alt);color:var(--text-soft)}
.dlg-ok{background:var(--danger);color:#fff}
.dlg-ok.p{background:var(--primary)}
.dlg-inp{width:100%;padding:9px;border:1.5px solid var(--border-soft);border-radius:10px;font-size:14px;text-align:center;background:var(--surface-alt);color:var(--text);-webkit-user-select:text;user-select:text}

#toast{position:fixed;bottom:calc(180px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:10003;display:none;white-space:nowrap;pointer-events:none}
#toast.on{display:block;animation:tA 2s ease forwards}
@keyframes tA{0%{opacity:0}15%{opacity:1}75%{opacity:1}100%{opacity:0}}

/* Date detail overlay */
.detail-ov{position:fixed;inset:0;background:rgba(58,55,48,.42);z-index:9999;display:none;align-items:center;justify-content:center;padding:24px 20px}
.detail-ov.on{display:flex}
.detail-box{background:var(--surface);border-radius:18px;width:100%;max-width:320px;max-height:68vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow-lg)}
.detail-head{display:flex;align-items:center;justify-content:space-between;padding:14px 14px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.detail-title{font-size:16px;font-weight:700}
.detail-close{width:30px;height:30px;border-radius:50%;background:var(--surface-alt);border:1px solid var(--border);font-size:15px;color:var(--text-soft);display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0}
.detail-close:active{background:var(--danger-tint);color:var(--danger);border-color:var(--danger)}
.detail-chips{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px;flex:1}
.detail-chip{display:block;width:100%;padding:12px 14px;border-radius:10px;margin-bottom:8px;font-size:14px;font-weight:700;text-align:left;transition:opacity .15s;border:1.5px solid transparent;cursor:pointer;touch-action:none}
.detail-chip:last-child{margin-bottom:0}
.detail-chip.pressing{opacity:.5}
.detail-chip.dc-dragging{opacity:.25}
.detail-drop-line{height:3px;background:var(--primary);border-radius:2px;margin:3px 0;flex-shrink:0;pointer-events:none}
.detail-empty{padding:28px 0;text-align:center;color:var(--text-faint);font-size:14px}
.detail-foot{padding:8px 12px 10px;text-align:center;font-size:11px;color:var(--text-faint);border-top:1px solid var(--border);flex-shrink:0}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <button class="btn-reset-hdr" id="bReset">リセット</button>
    <h1>当番表</h1>
    <button class="btn-exec-hdr" id="bExec">実行</button>
  </div>
  <div class="mnav">
    <button class="btn-arr" id="bPrev">◀</button>
    <button class="btn-ym" id="bYM"></button>
    <button class="btn-arr" id="bNext">▶</button>
  </div>
  <div class="cal-sec">
    <div class="cal-grid" id="calGrid"></div>
  </div>
  <div class="names-sec" id="namesSec">
    <div class="names-hint" id="namesHint">日付をタップして選択 → 名前をタップで配置　長押しで並び替え</div>
    <div class="name-cards" id="nameCards"></div>
  </div>
</div>

<!-- Action Sheet -->
<div class="sheet-ov" id="sheetOv">
  <div class="sheet">
    <div class="sheet-title" id="sheetTitle"></div>
    <div id="sheetActs"></div>
    <div class="sheet-gap"></div>
    <button class="sheet-cancel" id="sheetCancel">キャンセル</button>
  </div>
</div>

<!-- YM picker -->
<div class="ym-ov" id="ymOv">
  <div class="ym-sheet">
    <div class="ym-yr-row">
      <button class="ym-yr-btn" id="yPrev">◀</button>
      <span class="ym-yr" id="yLabel"></span>
      <button class="ym-yr-btn" id="yNext">▶</button>
    </div>
    <div class="ym-months" id="ymMonths"></div>
    <button class="ym-cancel" id="ymClose">キャンセル</button>
  </div>
</div>

<!-- Date detail -->
<div class="detail-ov" id="detailOv">
  <div class="detail-box">
    <div class="detail-head">
      <span class="detail-title" id="detailTitle"></span>
      <button class="detail-close" id="detailClose">✕</button>
    </div>
    <div class="detail-chips" id="detailChips"></div>
    <div class="detail-foot">タップで取り消し確認　長押しで並び替え</div>
  </div>
</div>

<!-- Dialog -->
<div class="dlg-ov" id="dlgOv">
  <div class="dlg-box">
    <p class="dlg-msg" id="dlgMsg"></p>
    <div class="dlg-extra" id="dlgExtra"></div>
    <div class="dlg-acts" id="dlgActs"></div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';
let _uid=Date.now();
function uid(){ return 'i'+(++_uid).toString(36); }
function $(id){ return document.getElementById(id); }
function pad(n){ return String(n).padStart(2,'0'); }

const WEEK=['日','月','火','水','木','金','土'];
const CIRC=['⓪','①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩','⑪','⑫','⑬','⑭','⑮','⑯','⑰','⑱','⑲','⑳'];
function cn(n){ return n<=20?CIRC[n]:String(n); }

// 色相環を12等分したパステルパレット（各人に自動割り当て）
const PASTEL=[
  {bg:'#FFD0C8',tc:'#9A3228',bc:'#FFAAA0'}, //  0° コーラル
  {bg:'#FFDDB0',tc:'#8C4A18',bc:'#FFC880'}, // 30° アプリコット
  {bg:'#FFF0A0',tc:'#6C5600',bc:'#FFE840'}, // 60° レモン
  {bg:'#DEF0A8',tc:'#2C5000',bc:'#C8E880'}, // 90° ライム
  {bg:'#C0EDCC',tc:'#185A2E',bc:'#88E0A8'}, // 120° ミント
  {bg:'#B0EDE0',tc:'#0C5648',bc:'#70E0CC'}, // 150° ティール
  {bg:'#B0E8F8',tc:'#0A4A6A',bc:'#70D4F0'}, // 180° スカイ
  {bg:'#C0D8F8',tc:'#162E7E',bc:'#88B8F0'}, // 210° コーンフラワー
  {bg:'#D0C4F8',tc:'#3016A0',bc:'#AC90F4'}, // 240° ペリウィンクル
  {bg:'#E8C4F8',tc:'#5C1698',bc:'#D48CF4'}, // 270° ラベンダー
  {bg:'#F4C4F0',tc:'#6E1078',bc:'#E488E0'}, // 300° オーキッド
  {bg:'#FAC4D8',tc:'#980840',bc:'#F08CB8'}, // 330° ローズ
];
function nextColorIdx(){
  const used=new Set(S.names.map(n=>n.colorIdx));
  for(let i=0;i<PASTEL.length;i++) if(!used.has(i)) return i;
  return S.names.length%PASTEL.length;
}
function pc(nm){ return PASTEL[(nm.colorIdx??0)%PASTEL.length]; }

const SEP_ID='__sep__';
function ensureSep(){
  if(!S.names.find(n=>n.sep)){
    S.names.unshift({id:SEP_ID,name:'区切り',sep:true});
    save();
  }
}

const HOL={
  '2024-01-01':1,'2024-01-08':1,'2024-02-11':1,'2024-02-12':1,'2024-02-23':1,
  '2024-03-20':1,'2024-04-29':1,'2024-05-03':1,'2024-05-04':1,'2024-05-05':1,'2024-05-06':1,
  '2024-07-15':1,'2024-08-11':1,'2024-08-12':1,'2024-09-16':1,'2024-09-22':1,'2024-09-23':1,
  '2024-10-14':1,'2024-11-03':1,'2024-11-04':1,'2024-11-23':1,
  '2025-01-01':1,'2025-01-13':1,'2025-02-11':1,'2025-02-23':1,'2025-02-24':1,
  '2025-03-20':1,'2025-04-29':1,'2025-05-03':1,'2025-05-04':1,'2025-05-05':1,'2025-05-06':1,
  '2025-07-21':1,'2025-08-11':1,'2025-09-15':1,'2025-09-23':1,
  '2025-10-13':1,'2025-11-03':1,'2025-11-23':1,'2025-11-24':1,
  '2026-01-01':1,'2026-01-12':1,'2026-02-11':1,'2026-02-23':1,
  '2026-03-20':1,'2026-04-29':1,'2026-05-03':1,'2026-05-04':1,'2026-05-05':1,'2026-05-06':1,
  '2026-07-20':1,'2026-08-11':1,'2026-09-21':1,'2026-09-22':1,'2026-09-23':1,
  '2026-10-12':1,'2026-11-03':1,'2026-11-23':1,
  '2027-01-01':1,'2027-01-11':1,'2027-02-11':1,'2027-02-23':1,
  '2027-03-21':1,'2027-04-29':1,'2027-05-03':1,'2027-05-04':1,'2027-05-05':1,
  '2027-07-19':1,'2027-08-11':1,'2027-09-20':1,'2027-09-23':1,
  '2027-10-11':1,'2027-11-03':1,'2027-11-23':1,
  '2028-01-01':1,'2028-01-10':1,'2028-02-11':1,'2028-02-23':1,
  '2028-03-20':1,'2028-04-29':1,'2028-05-03':1,'2028-05-04':1,'2028-05-05':1,
  '2028-07-17':1,'2028-08-11':1,'2028-09-18':1,'2028-09-22':1,
  '2028-10-09':1,'2028-11-03':1,'2028-11-23':1,
};
function dayColor(ds,dow){
  if(dow===0||HOL[ds]) return 'var(--sun)';
  if(dow===6) return 'var(--sat)';
  return 'var(--text)';
}

/* ---- State ---- */
let S={names:[]};
let CD={};
let cY,cM,pickY;
let selectedDate=null;
let detailDs=null;
let lastTapDs=null,lastTapT=0;

function ym(y,m){ return y+'-'+pad(m); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }

function save(){
  localStorage.setItem('tb_s',JSON.stringify(S));
  localStorage.setItem('tb_d',JSON.stringify(CD));
}
function load(){
  try{ const x=JSON.parse(localStorage.getItem('tb_s')); if(x&&x.names) S=x; }catch{}
  try{ const x=JSON.parse(localStorage.getItem('tb_d')); if(x) CD=x; }catch{}
  // 既存の名前にcolorIdxが無い場合は順番に割り当て（sep除く）
  let changed=false;
  S.names.forEach((n,i)=>{ if(!n.sep&&n.colorIdx===undefined){ n.colorIdx=i%PASTEL.length; changed=true; } });
  if(changed) localStorage.setItem('tb_s',JSON.stringify(S));
  ensureSep();
  const t=new Date(); cY=t.getFullYear(); cM=t.getMonth()+1;
}
function getMonData(){ return CD[ym(cY,cM)]||{}; }
function nameCount(id){
  let n=0;
  Object.values(getMonData()).forEach(arr=>arr.forEach(i=>{ if(i===id) n++; }));
  return n;
}

/* ---- Calendar rows CSS var ---- */
function updateCalRows(){
  const firstDow=new Date(cY,cM-1,1).getDay();
  const days=new Date(cY,cM,0).getDate();
  document.documentElement.style.setProperty('--cal-rows',Math.ceil((firstDow+days)/7));
}

/* ---- Selected date ---- */
function selectDate(ds){
  selectedDate=ds;
  document.querySelectorAll('.dc.selected').forEach(c=>c.classList.remove('selected'));
  const hint=$('namesHint');
  if(ds){
    const cell=document.querySelector(`.dc[data-date="${ds}"]`);
    if(cell) cell.classList.add('selected');
    const d=new Date(ds+'T00:00:00');
    hint.textContent='【'+(d.getMonth()+1)+'月'+d.getDate()+'日を選択中】名前をタップして配置（他を触らない限り選択継続）';
    hint.classList.add('active');
  } else {
    hint.textContent='日付をタップして選択 → 名前をタップで配置　長押しで並び替え';
    hint.classList.remove('active');
  }
}

/* ---- Render ---- */
function renderAll(){ updateCalRows(); renderNav(); renderCal(); renderCards(); }
function renderNav(){ $('bYM').textContent=cY+'/'+pad(cM); }

function renderCal(){
  const grid=$('calGrid');
  grid.innerHTML='';
  const k=ym(cY,cM);
  const data=CD[k]||{};
  const today=todayStr();
  const firstDow=new Date(cY,cM-1,1).getDay();
  const days=new Date(cY,cM,0).getDate();
  const cells=Math.ceil((firstDow+days)/7)*7;

  WEEK.forEach((d,i)=>{
    const el=document.createElement('div');
    el.className='dh'; el.textContent=d;
    if(i===0) el.style.color='var(--sun)';
    else if(i===6) el.style.color='var(--sat)';
    grid.appendChild(el);
  });

  for(let i=0;i<cells;i++){
    const day=i-firstDow+1;
    const el=document.createElement('div');
    if(day<1||day>days){
      el.className='dc empty';
      el.addEventListener('click',()=>selectDate(null));
      grid.appendChild(el); continue;
    }
    const ds=k+'-'+pad(day);
    const dow=i%7;
    el.className='dc'+(ds===today?' is-today':'');
    el.dataset.date=ds;

    const dn=document.createElement('div'); dn.className='dn';
    const dni=document.createElement('span'); dni.className='dn-inner';
    dni.textContent=day; dni.style.color=dayColor(ds,dow);
    dn.appendChild(dni); el.appendChild(dn);

    const nw=document.createElement('div'); nw.className='dnames';
    (data[ds]||[]).forEach((nid,idx)=>{
      const nm=S.names.find(n=>n.id===nid);
      if(!nm) return;
      if(nm.sep){
        const chip=document.createElement('div');
        chip.className='sep-chip';
        initChip(chip,ds,idx,nm);
        nw.appendChild(chip);
        return;
      }
      const p=pc(nm);
      const chip=document.createElement('div');
      chip.className='chip';
      chip.style.background=p.bg;
      chip.style.color=p.tc;
      chip.style.border=`1px solid ${p.bc}`;
      chip.textContent=nm.name;
      initChip(chip,ds,idx,nm);
      nw.appendChild(chip);
    });
    el.appendChild(nw);

    el.addEventListener('click',e=>{
      if(e.target.closest('.chip')) return;
      const now=Date.now();
      if(lastTapDs===ds&&now-lastTapT<350){
        // ダブルタップ → 拡大表示
        lastTapDs=null; lastTapT=0;
        openDateDetail(ds);
      } else {
        lastTapDs=ds; lastTapT=now;
        if(ds===selectedDate) selectDate(null);
        else selectDate(ds);
      }
    });

    grid.appendChild(el);
  }

  // Restore selection highlight after re-render
  if(selectedDate){
    if(selectedDate.startsWith(ym(cY,cM)+'-')){
      const sel=document.querySelector(`.dc[data-date="${selectedDate}"]`);
      if(sel) sel.classList.add('selected');
    } else {
      selectedDate=null;
      $('namesHint').textContent='日付をタップして選択 → 名前をタップで配置　長押しで並び替え';
      $('namesHint').classList.remove('active');
    }
  }
}

function renderCards(){
  const wrap=$('nameCards');
  wrap.innerHTML='';
  S.names.forEach(nm=>{
    if(nm.sep){
      const card=document.createElement('div');
      card.className='nc nc-sep'; card.dataset.nid=nm.id;
      const inn=document.createElement('div');
      inn.style.cssText='display:flex;align-items:center;gap:5px;min-width:88px;width:100%';
      const b1=document.createElement('div'); b1.className='sep-bar';
      const lb=document.createElement('span'); lb.className='sep-lbl'; lb.textContent='区切り';
      const b2=document.createElement('div'); b2.className='sep-bar';
      inn.appendChild(b1); inn.appendChild(lb); inn.appendChild(b2);
      card.appendChild(inn);
      initNameCard(card,nm);
      wrap.appendChild(card);
      return;
    }
    const p=pc(nm);
    const card=document.createElement('div');
    card.className='nc'; card.dataset.nid=nm.id;
    card.style.background=p.bg;
    card.style.borderColor=p.bc;
    const sp1=document.createElement('span'); sp1.className='nm'; sp1.textContent=nm.name;
    sp1.style.color=p.tc;
    const sp2=document.createElement('span'); sp2.className='cnt'; sp2.textContent=cn(nameCount(nm.id));
    sp2.style.color=p.tc;
    card.appendChild(sp1); card.appendChild(sp2);
    initNameCard(card,nm);
    wrap.appendChild(card);
  });
  const ab=document.createElement('button');
  ab.className='btn-add-name'; ab.textContent='＋ 追加';
  ab.addEventListener('click',doAddName);
  wrap.appendChild(ab);
}

/* ---- Date detail overlay ---- */
function openDateDetail(ds){
  detailDs=ds;
  const k=ds.slice(0,7);
  const names=(CD[k]&&CD[k][ds])||[];
  const d=new Date(ds+'T00:00:00');
  const dow=d.getDay();
  const label=(d.getMonth()+1)+'月'+d.getDate()+'日（'+WEEK[dow]+'）';
  const col=dow===0||HOL[ds]?'var(--sun)':dow===6?'var(--sat)':'var(--text)';
  const title=$('detailTitle');
  title.textContent=label; title.style.color=col;

  const chips=$('detailChips');
  chips.innerHTML='';
  if(names.length===0){
    const emp=document.createElement('div');
    emp.className='detail-empty'; emp.textContent='配置なし';
    chips.appendChild(emp);
  } else {
    names.forEach((nid,idx)=>{
      const nm=S.names.find(n=>n.id===nid);
      if(!nm) return;
      if(nm.sep){
        const chip=document.createElement('button');
        chip.className='detail-chip';
        chip.style.cssText='background:var(--surface-alt);border-color:var(--border);display:flex;align-items:center;gap:8px;padding:10px 14px';
        const l1=document.createElement('div'); l1.style.cssText='flex:1;height:1.5px;background:var(--border)';
        const lb=document.createElement('span'); lb.style.cssText='font-size:11px;color:var(--text-faint);font-weight:700;flex-shrink:0'; lb.textContent='区切り';
        const l2=document.createElement('div'); l2.style.cssText='flex:1;height:1.5px;background:var(--border)';
        chip.appendChild(l1); chip.appendChild(lb); chip.appendChild(l2);
        chip.dataset.chipNid=nid;
        initDetailChip(chip,ds,idx,nm);
        chips.appendChild(chip);
        return;
      }
      const p=pc(nm);
      const chip=document.createElement('button');
      chip.className='detail-chip';
      chip.style.background=p.bg;
      chip.style.color=p.tc;
      chip.style.borderColor=p.bc;
      chip.textContent=nm.name;
      chip.dataset.chipNid=nid;
      initDetailChip(chip,ds,idx,nm);
      chips.appendChild(chip);
    });
  }
  const ov=$('detailOv');
  ov.classList.add('on');
  // ダブルタップ直後のゴーストクリックでオーバーレイが即閉じるのを防ぐ
  ov.style.pointerEvents='none';
  setTimeout(()=>{ ov.style.pointerEvents=''; },350);
}

function closeDetailOv(){
  $('detailOv').classList.remove('on');
  detailDs=null;
}

/* ---- Detail view drop line ---- */
let _ddl=null;
function getDdl(){
  if(!_ddl){_ddl=document.createElement('div');_ddl.className='detail-drop-line';}
  return _ddl;
}
function removeDdl(){if(_ddl&&_ddl.parentNode)_ddl.parentNode.removeChild(_ddl);}

/* ---- Detail chip: tap=削除確認、long press=並び替え ---- */
function initDetailChip(chip,ds,idx,nm){
  let timer=null,ptId=-1,sx=0,sy=0,moved=false,reordering=false;
  chip.addEventListener('pointerdown',e=>{
    ptId=e.pointerId; sx=e.clientX; sy=e.clientY; moved=false; reordering=false;
    timer=setTimeout(()=>{
      timer=null;
      if(!moved){reordering=true;chip.setPointerCapture(ptId);chip.classList.add('dc-dragging');}
    },500);
  });
  chip.addEventListener('pointermove',e=>{
    if(e.pointerId!==ptId) return;
    if(!moved&&(Math.abs(e.clientX-sx)>10||Math.abs(e.clientY-sy)>10)){
      if(timer){clearTimeout(timer);timer=null;}
      moved=true;
    }
    if(!reordering) return;
    const chipsEl=$('detailChips');
    chip.style.pointerEvents='none';
    const hit=document.elementFromPoint(e.clientX,e.clientY);
    chip.style.pointerEvents='';
    if(!hit) return;
    const tgt=hit.closest('.detail-chip');
    if(tgt&&tgt!==chip){
      const r=tgt.getBoundingClientRect();
      const dl=getDdl();
      if(e.clientY<r.top+r.height/2) chipsEl.insertBefore(dl,tgt);
      else chipsEl.insertBefore(dl,tgt.nextSibling);
    }
  });
  chip.addEventListener('pointerup',e=>{
    if(e.pointerId!==ptId) return;
    if(timer){clearTimeout(timer);timer=null;}
    chip.classList.remove('dc-dragging');
    if(reordering){
      reordering=false;
      const dl=getDdl();
      if(dl.parentNode) dl.parentNode.insertBefore(chip,dl);
      removeDdl();
      const k=ds.slice(0,7);
      const newIds=[...$('detailChips').querySelectorAll('[data-chip-nid]')].map(c=>c.dataset.chipNid);
      if(CD[k]&&CD[k][ds]) CD[k][ds]=newIds;
      ptId=-1;
      save(); renderCal(); renderCards();
      if($('detailOv').classList.contains('on')&&detailDs===ds) openDateDetail(ds);
      return;
    }
    if(!moved){
      const label=nm.sep?'区切りを取り消しますか？':nm.name+' を取り消しますか？';
      dlg(label,{danger:true,ok:'取り消す'}).then(ok=>{
        if(ok){
          removeAssign(ds,idx);
          if($('detailOv').classList.contains('on')&&detailDs===ds) openDateDetail(ds);
        }
      });
    }
    ptId=-1;
  });
  chip.addEventListener('pointercancel',e=>{
    if(e.pointerId!==ptId) return;
    if(timer){clearTimeout(timer);timer=null;}
    chip.classList.remove('dc-dragging');
    if(reordering) removeDdl();
    reordering=false; ptId=-1;
  });
}

/* ---- Chip on calendar: tap → 日付選択、double tap → 詳細表示 ---- */
function initChip(chip,ds,idx,nm){
  let ptId=-1,sx=0,sy=0,moved=false;
  chip.addEventListener('pointerdown',e=>{
    e.stopPropagation();
    ptId=e.pointerId; sx=e.clientX; sy=e.clientY; moved=false;
  });
  chip.addEventListener('pointermove',e=>{
    if(e.pointerId!==ptId) return;
    if(Math.abs(e.clientX-sx)>10||Math.abs(e.clientY-sy)>10) moved=true;
  });
  chip.addEventListener('pointerup',e=>{
    if(e.pointerId!==ptId) return;
    if(!moved){
      const now=Date.now();
      if(lastTapDs===ds&&now-lastTapT<350){
        lastTapDs=null; lastTapT=0;
        openDateDetail(ds);
      } else {
        lastTapDs=ds; lastTapT=now;
        if(ds===selectedDate) selectDate(null);
        else selectDate(ds);
      }
    }
    ptId=-1;
  });
  chip.addEventListener('pointercancel',e=>{ if(e.pointerId!==ptId) return; ptId=-1; });
}

/* ---- Drop line element (shared across reorders) ---- */
let _dropLine=null;
function getDropLine(){
  if(!_dropLine){
    _dropLine=document.createElement('div');
    _dropLine.className='nc-drop-line';
  }
  return _dropLine;
}
function removeDropLine(){
  if(_dropLine&&_dropLine.parentNode) _dropLine.parentNode.removeChild(_dropLine);
}

/* ---- Name card: tap=place/sheet, long press=reorder ---- */
function initNameCard(card,nm){
  let timer=null,feedTimer=null,ptId=-1,sx=0,sy=0,moved=false,reordering=false;

  card.addEventListener('pointerdown',e=>{
    if(e.button!==0&&e.pointerType==='mouse') return;
    ptId=e.pointerId; sx=e.clientX; sy=e.clientY;
    moved=false; reordering=false;

    // Subtle visual hint that long press is counting
    feedTimer=setTimeout(()=>card.classList.add('press-hi'),200);

    // Start reorder at 500ms
    timer=setTimeout(()=>{
      timer=null;
      clearTimeout(feedTimer); feedTimer=null;
      card.classList.remove('press-hi');
      if(!moved){
        reordering=true;
        card.setPointerCapture(ptId);
        card.classList.add('dragging');
      }
    },500);
  });

  card.addEventListener('pointermove',e=>{
    if(e.pointerId!==ptId) return;
    if(!moved&&(Math.abs(e.clientX-sx)>12||Math.abs(e.clientY-sy)>12)){
      clearTimeout(timer); timer=null;
      clearTimeout(feedTimer); feedTimer=null;
      card.classList.remove('press-hi');
      moved=true;
    }
    if(!reordering) return;

    // Find target card under pointer (temporarily hide self)
    card.style.pointerEvents='none';
    const hit=document.elementFromPoint(e.clientX,e.clientY);
    card.style.pointerEvents='';
    if(!hit) return;
    const target=hit.closest('.nc[data-nid]');
    if(target&&target!==card){
      const wrap=$('nameCards');
      const rect=target.getBoundingClientRect();
      const line=getDropLine();
      // Place the drop line before or after target depending on cursor position
      if(e.clientX<rect.left+rect.width/2) wrap.insertBefore(line,target);
      else wrap.insertBefore(line,target.nextSibling);
    }
  });

  card.addEventListener('pointerup',e=>{
    if(e.pointerId!==ptId) return;
    clearTimeout(timer); timer=null;
    clearTimeout(feedTimer); feedTimer=null;
    card.classList.remove('press-hi','dragging');

    if(reordering){
      reordering=false;
      // Move card to where drop line is
      const line=getDropLine();
      if(line.parentNode) line.parentNode.insertBefore(card,line);
      removeDropLine();
      // Persist new order
      const newOrder=[...$('nameCards').querySelectorAll('.nc[data-nid]')].map(c=>c.dataset.nid);
      S.names=newOrder.map(id=>S.names.find(n=>n.id===id)).filter(Boolean);
      save(); renderCards();
    } else if(!moved){
      // Tap: place on selected date OR open edit/delete sheet
      if(selectedDate){
        addAssign(selectedDate,nm.id);
        // Keep selectedDate active so user can keep adding names
      } else {
        showNameCardSheet(nm);
      }
    }
    ptId=-1;
  });

  card.addEventListener('pointercancel',e=>{
    if(e.pointerId!==ptId) return;
    clearTimeout(timer); timer=null;
    clearTimeout(feedTimer); feedTimer=null;
    card.classList.remove('press-hi','dragging');
    if(reordering){ removeDropLine(); }
    ptId=-1;
  });
}

/* ---- Data ops ---- */
function addAssign(ds,nid){
  const k=ds.slice(0,7);
  if(!CD[k]) CD[k]={};
  if(!CD[k][ds]) CD[k][ds]=[];
  CD[k][ds].push(nid);
  save(); renderCal(); renderCards();
}
function removeAssign(ds,idx){
  const k=ds.slice(0,7);
  if(!CD[k]||!CD[k][ds]) return;
  CD[k][ds].splice(idx,1);
  if(!CD[k][ds].length) delete CD[k][ds];
  if(!Object.keys(CD[k]).length) delete CD[k];
  save(); renderCal(); renderCards();
}
function swapAssign(ds,idx,newId){
  const k=ds.slice(0,7);
  if(!CD[k]||!CD[k][ds]) return;
  CD[k][ds][idx]=newId;
  save(); renderCal(); renderCards();
}
async function doReset(){
  const k=ym(cY,cM);
  if(!CD[k]||!Object.keys(CD[k]).length){ toast('この月のデータはありません'); return; }
  if(!await dlg(cY+'年'+cM+'月の当番データを\nすべてリセットしますか？',{danger:true,ok:'リセット'})) return;
  delete CD[k]; save(); renderCal(); renderCards(); toast('リセットしました');
}
async function doAddName(){
  const v=await dlg('名前を入力',{input:true,ph:'名前',ok:'追加'});
  if(v){ S.names.push({id:uid(),name:v,colorIdx:nextColorIdx()}); save(); renderCards(); }
}
async function doEditName(id){
  const nm=S.names.find(n=>n.id===id);
  if(!nm) return;
  const v=await dlg('名前を変更',{input:true,ph:'名前',val:nm.name,ok:'変更'});
  if(v&&v!==nm.name){ nm.name=v; save(); renderCal(); renderCards(); }
}
async function doDeleteName(id){
  const nm=S.names.find(n=>n.id===id);
  if(!nm) return;
  if(!await dlg(nm.name+' を削除しますか？\n当番表から全て取り除かれます',{danger:true,ok:'削除'})) return;
  Object.values(CD).forEach(month=>{
    Object.keys(month).forEach(date=>{
      month[date]=month[date].filter(i=>i!==id);
      if(!month[date].length) delete month[date];
    });
  });
  Object.keys(CD).forEach(k=>{ if(!Object.keys(CD[k]).length) delete CD[k]; });
  S.names=S.names.filter(n=>n.id!==id);
  save(); renderCal(); renderCards();
}

/* ---- Action Sheet ---- */
let _sheetRes=null;
function openSheet(title,actions){
  return new Promise(res=>{
    _sheetRes=res;
    $('sheetTitle').textContent=title;
    const ac=$('sheetActs');
    ac.innerHTML='';
    actions.forEach(a=>{
      const b=document.createElement('button');
      b.className='sheet-act'+(a.danger?' danger':'');
      b.textContent=a.label;
      b.addEventListener('click',()=>closeSheet(a.value));
      ac.appendChild(b);
    });
    $('sheetOv').classList.add('on');
  });
}
function closeSheet(val){
  $('sheetOv').classList.remove('on');
  if(_sheetRes){ const r=_sheetRes; _sheetRes=null; r(val===undefined?null:val); }
}

async function showNameCardSheet(nm){
  if(nm.sep) return;
  const action=await openSheet(nm.name,[
    {label:'編集（名前を変更）',value:'edit'},
    {label:'削除',value:'delete',danger:true}
  ]);
  if(action==='edit') await doEditName(nm.id);
  else if(action==='delete') await doDeleteName(nm.id);
}

async function showChipSheet(ds,idx,nm){
  if(nm.sep){
    const r=await openSheet('区切り',[{label:'取り消し（削除）',value:'remove',danger:true}]);
    if(r==='remove') removeAssign(ds,idx);
    return;
  }
  const others=S.names.filter(n=>n.id!==nm.id&&!n.sep);
  const actions=[
    {label:'取り消し（削除）',value:'remove',danger:true},
    ...others.map(n=>({label:n.name+'と入れ替え',value:'swap:'+n.id}))
  ];
  const result=await openSheet(nm.name,actions);
  if(!result) return;
  if(result==='remove') removeAssign(ds,idx);
  else if(result.startsWith('swap:')) swapAssign(ds,idx,result.slice(5));
}

/* ---- YM Picker ---- */
function openYM(){ pickY=cY; renderYMMonths(); $('ymOv').classList.add('on'); }
function renderYMMonths(){
  $('yLabel').textContent=pickY;
  const g=$('ymMonths'); g.innerHTML='';
  for(let m=1;m<=12;m++){
    const b=document.createElement('button');
    b.className='ym-mb'+(pickY===cY&&m===cM?' sel':'');
    b.textContent=m+'月';
    b.addEventListener('click',()=>{ cY=pickY; cM=m; $('ymOv').classList.remove('on'); selectDate(null); closeDetailOv(); renderAll(); });
    g.appendChild(b);
  }
}

/* ---- Dialog ---- */
function dlg(msg,opts){
  opts=opts||{};
  return new Promise(res=>{
    const ov=$('dlgOv');
    $('dlgMsg').textContent=msg;
    const ex=$('dlgExtra'); ex.innerHTML='';
    const ac=$('dlgActs'); ac.innerHTML='';
    let inp=null;
    if(opts.input){
      inp=document.createElement('input');
      inp.className='dlg-inp'; inp.type='text';
      inp.value=opts.val||''; inp.placeholder=opts.ph||''; inp.maxLength=20;
      ex.appendChild(inp);
      setTimeout(()=>inp.focus(),120);
    }
    const cb=document.createElement('button');
    cb.className='dlg-cancel'; cb.textContent='キャンセル';
    cb.addEventListener('click',()=>{ ov.classList.remove('on'); res(null); });
    ac.appendChild(cb);
    const ob=document.createElement('button');
    ob.className=opts.danger?'dlg-ok':'dlg-ok p';
    ob.textContent=opts.ok||'OK';
    ob.addEventListener('click',()=>{ ov.classList.remove('on'); res(opts.input?inp.value.trim():true); });
    ac.appendChild(ob);
    ov.classList.add('on');
  });
}

/* ---- Toast ---- */
function toast(msg){
  const t=$('toast'); t.textContent=msg; t.className='';
  void t.offsetWidth; t.className='on';
  setTimeout(()=>t.className='',2100);
}

/* ---- Events ---- */
$('detailClose').addEventListener('click',closeDetailOv);
$('detailOv').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeDetailOv(); });
$('bPrev').addEventListener('click',()=>{ cM--; if(cM<1){cM=12;cY--;} selectDate(null); closeDetailOv(); renderAll(); });
$('bNext').addEventListener('click',()=>{ cM++; if(cM>12){cM=1;cY++;} selectDate(null); closeDetailOv(); renderAll(); });
$('bYM').addEventListener('click',openYM);
$('bReset').addEventListener('click',doReset);
$('bExec').addEventListener('click',()=>{}); // 実行: 現在未実装

// 何もないところをタップで日付選択を解除
$('namesSec').addEventListener('click',e=>{
  if(!selectedDate) return;
  if(!e.target.closest('.nc')&&!e.target.closest('.btn-add-name')) selectDate(null);
});
$('yPrev').addEventListener('click',()=>{ pickY--; renderYMMonths(); });
$('yNext').addEventListener('click',()=>{ pickY++; renderYMMonths(); });
$('ymClose').addEventListener('click',()=>$('ymOv').classList.remove('on'));
$('ymOv').addEventListener('click',e=>{ if(e.target===e.currentTarget) e.currentTarget.classList.remove('on'); });
$('sheetOv').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeSheet(null); });
$('sheetCancel').addEventListener('click',()=>closeSheet(null));
window.addEventListener('resize',updateCalRows);

/* ---- Init ---- */
load();
renderAll();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
